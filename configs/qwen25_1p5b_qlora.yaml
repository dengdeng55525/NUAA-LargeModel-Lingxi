seed: 42

model:
  base_model: models/Qwen2.5-1.5B-Instruct
  trust_remote_code: true
  torch_dtype: auto
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

data:
  train_file: data/processed/lingxi_train.jsonl
  valid_file: data/processed/lingxi_valid.jsonl
  max_seq_length: 2048

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/lingxi-qwen25-1p5b-lora
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  eval_steps: 200
  save_steps: 500
  save_total_limit: 2
  gradient_checkpointing: true
  optim: paged_adamw_8bit
  lr_scheduler_type: cosine
  report_to:
    - tensorboard
