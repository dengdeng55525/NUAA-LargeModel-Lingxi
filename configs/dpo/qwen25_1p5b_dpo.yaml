seed: 42

model:
  base_model: models/Qwen2.5-1.5B-Instruct
  sft_adapter: outputs/lingxi-qwen25-1p5b-lora-30min
  trust_remote_code: true
  torch_dtype: auto
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

data:
  train_file: data/processed/dpo_train.jsonl
  valid_file: data/processed/dpo_valid.jsonl
  max_length: 1024
  max_prompt_length: 512
  max_target_length: 512

dpo:
  beta: 0.1
  loss_type: sigmoid

training:
  output_dir: outputs/lingxi-qwen25-1p5b-dpo
  max_steps: 90
  num_train_epochs: 2
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.00005
  warmup_ratio: 0.03
  weight_decay: 0.0
  logging_steps: 10
  eval_steps: 30
  save_steps: 90
  save_total_limit: 1
  gradient_checkpointing: true
  optim: adamw_torch
  lr_scheduler_type: cosine
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  dataloader_persistent_workers: false
  dataloader_prefetch_factor:
  report_to:
    - tensorboard
